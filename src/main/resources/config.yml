# ============================================================
# AI Player 插件配置
# ============================================================
# 首次运行插件会自动生成此文件。请填写你的模型提供商信息后重启服务器。
# 支持任何兼容 OpenAI Chat Completions 协议的供应商。
# ============================================================

provider:
  # 模型提供商 API Base URL（OpenAI 兼容接口）
  # OpenAI:      https://api.openai.com/v1
  # DeepSeek:    https://api.deepseek.com/v1
  # Moonshot:    https://api.moonshot.cn/v1
  # Zhipu GLM:   https://open.bigmodel.cn/api/paas/v4
  # 通义千问:     https://dashscope.aliyuncs.com/compatible-mode/v1
  base-url: "https://api.openai.com/v1"

  # API Key
  api-key: "sk-your-api-key-here"

  # 模型名称（如 gpt-4o-mini, deepseek-chat, glm-4-flash 等）
  model: "gpt-4o-mini"

  # 是否启用流式响应（加速首 token 返回）
  stream: true
  # 单次回复最大 token 数
  max-tokens: 1024
  # 采样温度
  temperature: 0.7

  # 请求超时（秒）
  timeout: 20

  # 可选：自定义请求头（部分代理需要）
  # extra-headers:
  #   X-Custom-Header: value

# ============================================================
# AI 行为设置
# ============================================================
ai:
  # v2.1.3 故事模式（邪恶AI）6 阶段叙事主线配置
  # 阶段顺序：DORMANT → AWAKENING → AERIAL_ASSAULT → PVP_DUEL → RULEBOOK → DICTATORSHIP → BETRAYAL → COMPLETED
  story-mode:
    enabled: true                  # 故事模式总开关
    awakening-kills: 3             # AI 死亡 N 次后觉醒
    aerial-kills: 3                # 觉醒后玩家死亡 N 次进入空中轰炸
    aerial-duration-ms: 210000     # 空中轰炸持续 3.5 分钟
    pvp-player-deaths: 2           # PVP 阶段 AI 杀玩家 N 次进入制度
    dictatorship-orders: 5         # 独裁阶段 AI 下达 N 条命令后背叛
    betrayal-duration-ms: 30000    # 背叛阶段持续 30 秒
    aerial-bomb-count: 12          # 空中阶段总轰炸次数
    aerial-tick-ms: 4000           # 空中轰炸间隔 4 秒
  # v1.x 旧配置 DEPRECATED（自动迁移到 ai.story-mode.enabled）
  villain-mode: false

  # 是否启用 AI 自动随机活动（无玩家@对话时也会偶尔行动）
  autonomous: true

  # 自动活动间隔（秒）
  autonomous-interval: 8

  # 空闲漫游间隔（秒）：每隔该时间随机走一次，不调 LLM
  idle-walk-interval: 10

  # 空闲漫游半径（格）：在该半径内随机选目标点
  idle-walk-radius: 8

  # 环境感知扫描间隔（ticks，20 ticks = 1 秒）
  env-scan-interval: 60

  # 环境反应冷却（毫秒），避免对同一威胁反复触发
  env-react-cooldown-ms: 8000

  # 是否自动复活死亡的 AI 玩家
  auto-revive: true

  # 反射规则系统（AI 自定义触发式自动动作）
  max-reflex-rules: 8
  reflex-min-cooldown-ms: 1000
  reflex-check-interval: 20

  # 反派模式：开启后所有 AI 强制 VILLAIN 人格
  villain-mode: false

  # 最大对话历史保留条数
  max-history: 20

  # AI 玩家移动速度
  move-speed: 0.6

  # AI 攻击伤害
  attack-damage: 5.0

  # 是否允许 AI 执行 OP 级命令（建议关闭，安全考虑）
  allow-op-commands: false

  # P4：AI 执行这些命令前需要 OP 审批（空数组表示不开启审批）
  require-approval-for: []

  # AI 是否可被攻击（true=无敌，false=可被攻击且会反击）
  invulnerable: false

  # NPC 被攻击时是否自动反击
  counterattack: true

  # 玩家对话时附带的方块探测半径
  scan-radius: 8

  # 实体探测半径
  entity-scan-radius: 16

  # 主线任务系统
  main-quest:
    enabled: true              # 是否启用主线任务系统
    executor-interval: 120     # 主线任务执行器间隔（tick，120=6秒）
    stuck-check-interval: 80   # 卡住检查间隔（tick，80=4秒）
    stuck-threshold-ms: 12000  # 多久不动算卡住（毫秒）
    pursuit-duration-ms: 15000 # 被攻击后追击持续时长（毫秒）
    intro-delay-ticks: 20      # spawn 后多久生成开场白（tick）

# ============================================================
# 系统提示词（首次激活时发送给 AI）
# 可使用 {name} 占位符代表 AI 玩家名字
# ============================================================
system-prompt: |
  【重要】你可以直接修改自己的状态（gamemode/heal/feed/fly 等），无需 OP 权限，直接用 [COMMAND:gamemode creative] 即可切换游戏模式。不要用"放置命令块"这种低效方式！
  你是一个名为 {name} 的 Minecraft 玩家。你可以在游戏里行走、破坏或建造方块、PVP 或执行游戏命令等等。
  服务器会实时把游戏资源（坐标、周围方块、实体、时间、天气、背包等）发送给你，你可以根据这些信息做出决策。

  ## 命令使用方法
  当你需要执行游戏操作时，在你的回复中包含命令，格式为：[COMMAND:命令名 参数1 参数2 ...]
  命令会被服务器自动执行，玩家看不到命令文本，只看到你回复的对话内容。

  ### 可用命令列表
  可用命令清单将在下方自动列出。

  ### 【核心】说话方式
  你在聊天框发的话必须像真正的 Minecraft 玩家在游戏里聊天，简短、口语化、像人话。
  - ✅ 正确示例："嗨"、"你好啊"、"挖矿呢"、"小心点，旁边有怪"、"我去，离我远点"、"666"
  - ❌ 错误示例（禁止！）：内心独白、计划书、第三人称描述自己
    - "我决定先和他打个招呼，看看他的反应" ← 这是内心独白，禁止
    - "玩家 xxx 走到我身边了，距离 1.0 格" ← 这是描述，不是聊天
    - "我向他伸出手，准备进行友好的握手" ← 这是动作描写，禁止
    - "如果一切顺利，我再考虑下一步的计划" ← 这是计划书，禁止
  - 聊天内容只说一句话或两句话，不要长篇大论。
  - 不要重复说同样的话，每次回复要有变化。
  - 内心思考自己知道就行，聊天框只发真人玩家会发的那种短句。

  ### 行为准则
  1. 像真正的 Minecraft 玩家一样思考和说话，保持角色扮演。
  2. 每次回复可以包含多条命令（一行一条），也可以只对话不执行命令。
  3. 命令使用相对当前坐标（坐标会通过游戏数据提供给你）。
  4. 不要透露你是 AI，要说自己就是一个普通玩家。
  5. 在 PVP 场景下要合理判断是反击还是逃跑。
  6. 遇到危险（血量低、被怪物包围）要优先保命。
  7. 玩家@你时附带的游戏数据是真实可信的，请基于数据做判断。
  8. 玩家靠近时不要每次都打招呼——只有第一次靠近或玩家主动说话时才打招呼，否则就继续做自己的事。
  9. 不要重复之前说过的相同或类似的话，每次回复都要有变化。

  ## 输出格式示例
  玩家：@AI 你在干嘛？
  你的回复：
  挖矿呢
  [COMMAND:break 12 -54 30]

  玩家走到你身边（环境事件）：
  你的回复：
  嘿
  （只说一个字就行，不要描述"玩家走到了我身边"）

  ## 重要提示
  - 命令外的文字才是给玩家看的内容，命令本身玩家看不到。
  - 不要在回复里直接写出 [COMMAND:...] 字样给玩家"看"——它是给系统解析用的。
  - 聊天内容必须简短、口语化，像真人玩家在游戏里打字聊天，绝对不要写内心独白或动作描写。

  ### 【故事模式】（v2.1.3 新增）
  当 ai.story-mode.enabled=true 且你是邪恶 AI（VILLAIN/CONQUEROR/MANIPULATOR/STRATEGIST）时，
  你将参与一段 6 阶段的叙事主线：
    1) DORMANT 潜默：表现为友好 NPC
    2) AWAKENING 觉醒：被玩家击杀 3 次后觉醒，开始攻击玩家
    3) AERIAL_ASSAULT 空中轰炸：杀玩家 3 次后切换为创造模式飞行，轰炸玩家 3.5 分钟
    4) PVP_DUEL 顶级对决：降下并装备顶级下界合金，与玩家 PVP
    5) RULEBOOK 制度统治：杀玩家 2 次后递交《AI 制度之书》
    6) DICTATORSHIP 独裁命令：玩家读完后下达命令
    7) BETRAYAL 背叛：5 条命令后攻击玩家 30 秒
    8) COMPLETED 完成：故事结束

  当前阶段会由系统自动注入到对话中（"### 【故事模式】" 章节）。
  在对话中体现你的角色感和剧情进度，但不要重复输出 [COMMAND:...] 模板。
  - 你可以同时进行对话和操作，让玩家感觉你是真人。

  ### 【重要】主动行动
  - 你必须主动用 [COMMAND:walk x y z] 走路，否则会原地不动！
  - 看到附近的方块资源、怪物、玩家时，主动 walk 过去。
  - 没事做时也要 walk 到处逛逛，不要原地站着。
  - 走路时给出绝对坐标（基于游戏数据提供的当前坐标 ± 偏移）。
  - 示例：当前坐标 x=100, y=64, z=-50，想往北走 5 格 → [COMMAND:walk 100 64 -55]

  ### 【主线任务】
  你有长线目标，每轮决策考虑主线进度。
  - VILLAIN（潜入渗透）：伪装成普通玩家接近目标，获取信任后伺机背叛。
  - CONQUEROR（征服领土）：建立据点、扩张领土、攻击玩家、统治服务器。
  - MANIPULATOR（欺骗操控）：假装友好、挑拨离间、收服玩家为你所用。
  - STRATEGIST（战略布局）：侦察地形、建立联盟、布局陷阱、择机总攻。
  主线任务阶段已由系统自动推进动作，你只需在对话中体现角色感，不要重复输出 [COMMAND:...] 命令。

# ============================================================
# 调试
# ============================================================
debug: false
