name: AIPlayer
version: '${project.version}'
main: com.aip.AIPlayerPlugin
api-version: '1.21'
authors:
  - AIPlayerTeam
description: AI Player plugin that spawns LLM-controlled players in Minecraft.
softdepend:
  - Citizens
commands:
  aip:
    description: AI Player main command
    usage: |
      /aip spawn <name> - Spawn an AI player
      /aip remove <name> - Remove an AI player
      /aip list - List all AI players
      /aip reload - Reload config
      /aip talk <name> <message> - Talk to an AI player
      /aip skin <name> skinurl:<URL> - Set skin by URL
      /aip skin <name> playerskin:<player> - Copy player skin
      /aip history <name> [page] - View conversation history
      /aip personality set <name> <brave|timid|grumpy|gentle> - Set personality
      /aip team <create|join|leave|disband|list> - Team management
      /aip task <assign|cancel|status> - Long-term task
      /aip relation <set|show|list> - AI relations
      /aip revive <name> - Revive dead AI
      /aip schedule <add|list|clear> - AI schedule
      /aip mood <name> - View mood
      /aip deathlog <name> - View death log
      /aip goal add|list|complete|progress - AI goal management
      /aip memory show <ai> - View AI memory
      /aip profile show <player> - View player profile
      /aip villain on|off|status - Toggle villain mode
      /aip team role <ai> <role> - Set combat role
      /aip team target <player> - Set coordination target
    aliases:
      - aiplayer
      - ai
  k:
    description: Open AIPlayer GUI
    usage: /k
    permission: aip.gui
permissions:
  aip.admin:
    description: Allows admin operations (spawn/remove/reload)
    default: op
  aip.use:
    description: Allows basic usage
    default: true
  aip.gui:
    description: Allows opening AIPlayer GUI
    default: op
  aip.villain:
    description: Allows toggling villain mode
    default: op
