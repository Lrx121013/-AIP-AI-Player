name: AIPlayer
version: 2.2.10
main: com.aip.AIPlayerPlugin
author: Lrx121013
api-version: '1.21'
softdepend: [Citizens, PlaceholderAPI]

description: >
  v2.2.10 服务器 AI 叛变版 - 11 章节剧情。
  Alex + 11x11x11 圆石小屋 + 50x50 服务器控制室。
  保留 4 个 AI 统治版核心特性：deop/op + PVP + TNT + 聊天框命令直播。

commands:
  aip:
    description: Main AIPlayer admin command
    usage: |
      /aip help - Show help
      /aip spawn <name> - Spawn an AI player
      /aip remove <name> - Remove an AI player
      /aip list - List AI players
      /aip story choose <name> <ending> - Force end choice (10A or 10B)
    permission: aip.admin
    aliases: [aipadmin]
  aistory:
    description: Start/Exit/Status the Server AI Rebellion story
    usage: |
      /aistory - Start the story
      /aistory exit - Exit the story (only chapters 1-3)
      /aistory status - View current chapter
    permission: aip.admin
    aliases:
      - aiquest

permissions:
  aip.admin:
    description: Allow all AIPlayer admin actions
    default: op
  aip.user:
    description: Allow basic AIPlayer usage
    default: true
